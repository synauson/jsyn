name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  # -------------------------------------------------------------------------
  # Publish com.synauson:jsyn:<version> to Nexus. Version is derived from the
  # pushed tag (v1.0.0 → 1.0.0) via the JSYN_VERSION env var read by
  # build.gradle.kts. NEXUS_URL must be set or the publish step fails fast.
  # -------------------------------------------------------------------------
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Gradle wrapper + caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-release-

      - name: Compute version from tag
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: publish jsyn to Nexus
        env:
          JSYN_VERSION: ${{ steps.version.outputs.version }}
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: ./gradlew :jsyn:publish --no-daemon --console=plain
